# Build, test, and enforce 100% coverage for the RISCV library on Swift 6.2.

name: Swift

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Build
      run: swift build
    - name: Run tests with coverage gate
      run: ./scripts/coverage
    # The swift:6.2 container ships without curl, which the Codecov v5 uploader
    # needs to download its CLI binary.
    - name: Install Codecov uploader dependencies
      run: apt-get update && apt-get install -y --no-install-recommends curl
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.lcov
        fail_ci_if_error: true
        # The container starts with a fresh gpg keyring that lacks Codecov's
        # public key, so the uploader's signature check fails with "No public
        # key". The CLI is still fetched over HTTPS from cli.codecov.io; skip
        # only the GPG integrity step.
        skip_validation: true
